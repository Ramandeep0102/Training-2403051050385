<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Test</title>
    <style>
        .box {
            width: 150px;
            height: 150px;
            display: inline-block;
           border-radius: 4px;
            color: rgb(248, 18, 18);
            font-weight: bold;
            padding: 10px;
        }

        .fixed-box {
            background-color: #0b8a0b;
            position: fixed;
            left: 200px;
            top: 200px;
        }
        .static-box {
            background-color: #08568a;
            position: static;
        }

        .relative-box {
            background-color: #570303;
            position: relative;
           
        }

        .absolute-box {
            background-color: #6e5002;
            position: absolute;
            
        }
    </style>
</head>
<body>

    <main>
        <div class="box fixed-box">BOX 1</div>
        <div class="box relative-box">BOX 2 </div>
        <div class="box static-box">BOX 3 </div>
        <div class="box absolute-box">BOX 4 </div>
    </main>
    
</body>
</html>
