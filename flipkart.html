<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart-Clone</title>
    <link rel="stylesheet" href="flipkart.css">
</head>
<body>
    <div>
        <header class="outer_head">
            <div class="top-header-row">
                <div class="logo-container">
                    <div class="logo" style="background-color: #FFE51F;">
                        <img height="30px" width="30px" src="https://rukminim2.flixcart.com/fk-p-flap/52/44/image/d2ecfddf891a3922.png?q=60">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/92/36/image/31f7e3af490c225f.png?q=60" height="20px">
                    </div>
                    <div class="travel"  style="background-color: #cecdc5;">
                        <img src="https://rukminim2.flixcart.com/fk-p-flap/72/36/image/5a9ff48eef96b876.png?q=60" height="20px">
                    </div>
                </div>
                
                <div class="right-travel-location">
                    <span>📍</span>
                    <span style="font-size: 14px; font-weight: 700;">Vadodara,Gujarat <a href="#" style="text-decoration: none; color: #007bff;">Select delivery location ></a></span>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <div style="display: inline;">
                    <input class="input1" type="text" placeholder="Search for Products, Brands and More">
                </div>
                <div class="action-buttons-container">
                    <button class="blue-btn">Loginfor more cart</button>
                    
                </div>
            </div>

            <div class="head_nav">
                <span><div class="nav_logo"></div></span>
                <span><div class="nav_logo"></div></span>
                <span><div class="nav_logo"></div></span>
                <span><div class="nav_logo"></div></span>
                <span><div class="nav_logo"></div></span>
                <span><div class="nav_logo"></div></span>
                
                
            </div>
        </header>
    </div>
   
    <section>
        <div style="border: 2px solid black; padding: 8px; margin-right: 20px;">
            <div class="hero_slider">
                <img src="https://rukminim1.flixcart.com/fk-p-flap/940/460/image/6ca4b334af0a098c.png?q=60">
               <img src="https://rukminim1.flixcart.com/fk-p-flap/940/460/image/6ca4b334af0a098c.png?q=60">
                <img src="https://rukminim1.flixcart.com/fk-p-flap/940/460/image/6ca4b334af0a098c.png?q=60">
            </div>
        </div>
        <div class="Cards_container">
            <div style="display: inline-block; margin-right: 7px; text-align: center;">
                <img height="300px" src="https://rukminim1.flixcart.com/fk-p-flap/760/1020/image/7463422f193b5a37.png?q=60">
                <p>$69</p>
            </div>
            <div style="display: inline-block; margin-right: 7px; text-align: center;">
                <img height="300px" src="https://rukminim1.flixcart.com/fk-p-flap/760/1020/image/7463422f193b5a37.png?q=60">
                <p>$69</p>
            </div>
            <div style="display: inline-block; margin-right: 7px; text-align: center;">
                <img height="300px" src="https://rukminim1.flixcart.com/fk-p-flap/760/1020/image/7463422f193b5a37.png?q=60">
                <p>$69</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer">
            <div class="description">
                <h2>Flipkart</h2>
                <p>Best Place to Buy</p>
            </div>
            <div class="about">
                <h2>About</h2>
                <p>About us</p>
                <p>Contact us</p>
                <p>Career</p>
                <p>Information</p>
            </div>
            <div class="help">
                <h2>Help</h2>
                <p>Payment</p>
                <p>Orders</p> 
                <p>Cancellations</p>
                <p>FAQ</p>
            </div>
        </div>
        <div style="padding-top: 30px; background-color: black; color: white;">
            <p class="copy">&copy; 2026. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
