<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1be982;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background-color: #ffffff;
            width: 320px;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #a3b1a7; /* Matching jacket color */
        }

        .profile-card h3 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 4px solid #a3b1a7; 
            margin-bottom: 15px;
        }

        .profile-name {
            font-size: 22px;
            font-weight: bold;
            color: #222;
            margin-bottom: 5px;
        }

        .profile-title {
            font-size: 14px;
            color: #555252;
            margin-bottom: 25px;
        }

        .follow-btn {
            background-color: #2d52f5; 
            color: #eeeef0;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            
        }

        
    </style>
</head>
<body>

    <div class="profile-card">
        <h3>Profile Card</h3>
        
        <img class="profile-img" src="SELf.jpeg" alt="Profile Image">
        
        <div class="profile-name">Ramandeep Singh</div>
        <div class="profile-title">Software Developer</div>
        
        <button class="follow-btn">Follow</button>
    </div>

</body>
</html>
