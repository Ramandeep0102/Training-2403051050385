<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1be982;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background-color: #ffffff;
            width: 320px;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid #a3b1a7;
            position: relative; 
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #1be982;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .profile-card h3 {
            color: #333;
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-img-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 15px auto;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 4px solid #a3b1a7; 
        }

        .online-dot {
            position: absolute;
            bottom: 5px;
            right: 10px;
            width: 18px;
            height: 18px;
            background-color: #1be982;
            border: 3px solid white;
            border-radius: 50%;
        }

        .profile-name {
            font-size: 22px;
            font-weight: bold;
            color: #222;
            margin-bottom: 5px;
        }

        .profile-title {
            font-size: 14px;
            color: #555252;
            margin-bottom: 25px;
        }

        .follow-btn {
            background-color: #2d52f5; 
            color: #eeeef0;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .follow-btn:hover {
            background-color: #1a3cc7;
        }
    </style>
</head>
