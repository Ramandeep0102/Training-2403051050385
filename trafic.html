<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trafic Light</title>
    <style>
        .outer{
            width: 200px;
        height: 500px;
        background-color: rgb(19, 18, 18);
        border-radius: 50px;
         padding: 40px;
        
        align-items: center;
        margin: 50px auto;
        margin-top: 100px;
    }
    .inner{
        width: 150px;
        height: 150px;
        background-color: rgb(247, 239, 239);
        border-radius: 50%;
        margin: 20px auto;
    }
    #red{
        background-color: red;
    }
    #yellow{
        background-color: yellow;
    }
    #green{
        background-color: green;
    }
    </style>
    </head>
   
     <body>
  <div class="outer">
    <div class="inner" id="red"></div>
    <div class="inner" id="yellow"></div>
    <div class="inner" id="green"></div>
  </div>

</body>
</html>
