<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background-color: #141414;
            color: white;
            font-family: sans-serif;
        }

        /* TOP BAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #202020;
        }

        .logo {
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .search-box input {
            background-color: #121212;
            color: white;
            border: 1px solid #303030;
            padding: 8px 15px;
            border-radius: 20px;
            width: 300px;
        }

        .profile {
            background-color: #0088cc;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 200px;
            background-color: #212121;
            height: calc(100vh - 55px);
            padding-top: 10px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #383838;
        }

        .main-content {
            flex: 1;
            padding: 20px;
        }

        /* VIDEO GRID */
        .video-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .video-card {
            width: 280px;
            text-decoration: none;
            color: white;
        }

        .thumbnail {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .video-title {
            font-size: 14px;
            margin: 8px 0 4px 0;
            font-weight: bold;
        }

        .video-meta {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo"><i class="fa-brands fa-youtube"></i> YouTube</a>
        <div class="search-box">
            <input type="text" placeholder="Search">
        </div>
        <div class="profile">U</div>
    </nav>

    <div class="container">
        
        <aside class="sidebar">
            <a href="#"><i class="fa-solid fa-house"></i> Home</a>
            <a href="#"><i class="fa-solid fa-bolt"></i> Shorts</a>
            <a href="#"><i class="fa-solid fa-layer-group"></i> Subs</a>
        </aside>

        <main class="main-content">
            <div class="video-grid">
                
                <a href="#" class="video-card">
                    <img src="https://picsum.photos/seed/1/300/200" class="thumbnail" alt="Thumb">
                    <div class="video-title">Coding for Beginners</div>
                    <div class="video-meta">CodeAcademy • 10K views</div>
                </a>

                <a href="#" class="video-card">
                    <img src="https://picsum.photos/seed/2/300/200" class="thumbnail" alt="Thumb">
                    <div class="video-title">Lofi Beats to Study</div>
                    <div class="video-meta">Chill Tracks • 2M views</div>
                </a>

                <a href="#" class="video-card">
                    <img src="https://picsum.photos/seed/3/300/200" class="thumbnail" alt="Thumb">
                    <div class="video-title">How to Cook Pizza</div>
                    <div class="video-meta">Chef Life • 85K views</div>
                </a>

                <a href="#" class="video-card">
                    <img src="https://picsum.photos/seed/4/300/200" class="thumbnail" alt="Thumb">
                    <div class="video-title">Deep Cave Exploration</div>
                    <div class="video-meta">Nature TV • 120K views</div>
                </a>

            </div>
        </main>
    </div>

</body>
</html>
